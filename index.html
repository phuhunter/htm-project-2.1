<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./assets/css/reset.css" />
        <link rel="stylesheet" href="./assets/css/styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- Font Poppins -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <title>Dự án 2.1</title>
    </head>
    <body>
        <!-- HEADER -->
        <header class="header">
            <div class="content">
                <nav class="header__nav">
                    <!-- Logo -->
                    <a href="#!" class="header__logo">
                        <img
                            src="./img/Logo.svg"
                            alt="Besnik"
                            class="header__image"
                        />
                    </a>
                    <!-- Menu chính -->
                    <ul class="header__menu">
                        <li class="header__menu-item">
                            <a
                                href=""
                                class="header__menu-link header__menu-link--active"
                                >Home</a
                            >
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link">Features</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link">Pricing</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link">About</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link">Contact</a>
                        </li>
                    </ul>
                    <!-- Button sigin/signup -->
                    <div class="header__actions">
                        <a href="" class="btn header__action">Sign in</a>
                        <a
                            href=""
                            class="btn header__action header__action--outline"
                            >Sign Up</a
                        >
                    </div>
                </nav>
            </div>
        </header>

        <div class="main">
            <!-- HERO -->
            <section class="hero">
                <div class="content">
                    <div class="hero__inner">
                        <!-- Phần hero bên trái -->
                        <div class="hero__content">
                            <p class="hero__label">
                                <span class="hero__label-icon">😎 </span>EASY
                                LEAENING PLATFORM
                            </p>
                            <h1 class="hero__title">
                                Words learner come here.
                            </h1>
                            <p class="hero__desc">
                                Build skills with courses, certificates, and get
                                online knowledge from our world-class platform.
                            </p>
                            <div class="hero__actions">
                                <a href="#!" class="hero__button"
                                    >Get Started</a
                                >
                                <button class="herro__play" type="button">
                                    <img
                                        src="./img/play.svg"
                                        alt=""
                                        class="hero__play-icon"
                                    />
                                </button>
                            </div>
                        </div>

                        <!-- Phần hero bên phải -->
                        <figure class="hero__media">
                            <img
                                src="./img/hero.jpg"
                                alt=""
                                class="hero__image"
                            />
                            <ul class="hero__stats">
                                <li class="hero__stat hero__stat--course">
                                    <span
                                        class="hero__stat-icon hero__stat-icon--course"
                                    >
                                        <img
                                            src="./img/book.svg"
                                            alt=""
                                            class="hero__stat-icon-img"
                                        />
                                    </span>

                                    <div class="hero__stat-info">
                                        <span class="hero__stat-label"
                                            >Course</span
                                        >
                                        <strong class="hero__stat-value"
                                            >1000+</strong
                                        >
                                    </div>
                                </li>
                                <li class="hero__stat hero__stat--schedules">
                                    <span class="hero__stat-info"
                                        >Schedules</span
                                    >
                                    <img
                                        src="./img/Card1.svg"
                                        alt=""
                                        class="hero__stat-icon-schedules"
                                    />
                                    <img
                                        src="./img/Card2.svg"
                                        alt=""
                                        class="hero__stat-icon-schedules"
                                    />
                                    <img
                                        src="./img/Card3.svg"
                                        alt=""
                                        class="hero__stat-icon-schedules"
                                    />
                                    <img
                                        src="./img/Card4.svg"
                                        alt=""
                                        class="hero__stat-icon-schedules"
                                    />
                                </li>
                                <li class="hero__stat hero__stat--students">
                                    <span class="hero__stat-info">
                                        Our Active Students
                                    </span>
                                    <div class="hero__students">
                                        <ul class="hero__student-list">
                                            <li class="hero__student">
                                                <img
                                                    src="./img/avatar1.jpg"
                                                    alt=""
                                                    class="hero__student-avatar"
                                                />
                                            </li>
                                            <li class="hero__student">
                                                <img
                                                    src="./img/avatar2.jpg"
                                                    alt=""
                                                    class="hero__student-avatar"
                                                />
                                            </li>
                                            <li class="hero__student">
                                                <img
                                                    src="./img/avatar3.jpg"
                                                    alt=""
                                                    class="hero__student-avatar"
                                                />
                                            </li>
                                            <li class="hero__student">
                                                <img
                                                    src="./img/avatar4.jpg"
                                                    alt=""
                                                    class="hero__student-avatar"
                                                />
                                            </li>
                                            <li class="hero__student">
                                                <img
                                                    src="./img/avatar5.jpg"
                                                    alt=""
                                                    class="hero__student-avatar"
                                                />
                                            </li>
                                        </ul>
                                    </div>
                                </li>
                            </ul>
                        </figure>
                    </div>
                </div>
            </section>
        </div>
    </body>
</html>
